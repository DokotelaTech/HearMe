<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HearMe – Anonymous Feed | Fully Responsive</title>
    <link rel="stylesheet" href="feeds.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
    <!-- HEADER with notification icon -->
    <div class="header">
        <div class="header-content">
            <div class="logo-area">
                <h1>HearMe <span class="badge">PREMIUM</span></h1>
                <p class="header-sub">Anonymous Feed · Safe Space</p>
            </div>
            <div class="notification-icon" id="notificationBell">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" data-filter="all">All Posts</div>
        <div class="tab" data-filter="social">Struggles</div>
        <div class="tab" data-filter="success">Success</div>
    </div>

    <!-- FEED CONTAINER (dynamic posts will be injected here) -->
    <div class="feed-container">
        <div class="feed-grid" id="feedGrid">
            <!-- Empty state placeholder – replace with posts via JS -->
            <div class="empty-state" id="emptyState">
                <h2>✨ welcome to HearMe</h2>
                <p>Your anonymous voice matters.<br>Real stories, real support.</p>
                <div class="demo-hint">↓ tap the + button to create your first post</div>
            </div>
        </div>
    </div>

    <!-- FLOATING ACTION BUTTON (no conflict with bottom nav) -->
    <div class="fab-container">
        <button class="fab" id="createPostFab" aria-label="Create new post">+</button>
    </div>


         <!-- BOTTOM NAVIGATION -->
            <div class="bottom-nav">
                    <a href="feeds.html" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg></span>
                        Feeds
                    </a>
                    <a href="ai-chat.html" class="nav-item active">
                        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l1.5 4.5H18l-3.75 2.7 1.5 4.5L12 11.1l-3.75 2.6 1.5-4.5L6 6.5h4.5L12 2z"/><circle cx="12" cy="19" r="2" fill="currentColor" stroke="none"/></svg></span>
                        AI Chat
                    </a>

                    <!-- <a href="inbox.html" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></span>
                        Inbox
                    </a> -->

                    <a href="profile.html" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
                        Profile
                    </a>
            </div>
        </div>


<script src="feeds.js"></script>
</body>
</html>
