<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HearMe – Anonymous Feed | Fully Responsive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>

html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow-x:hidden;
}

body{
    min-height:100vh;
    min-height:100dvh;
}

/* MAIN APP FULL SCREEN */
.app{
    width:100%;
    max-width:100% !important;
    min-height:100vh;
    min-height:100dvh;
    margin:0 !important;
    border-radius:0;
}

/* HEADER FULL WIDTH */
.header,
.tabs,
.feed-container,
.bottom-nav{
    width:100%;
    max-width:100%;
    margin:0;
}

/* REMOVE CENTER GAPS ON DESKTOP */
.feed-grid{
    width:100%;
    max-width:100% !important;
    margin:0;
}

/* WIDER CONTENT ON LARGE SCREENS */
@media (min-width:1024px){

    .header{
        padding:1.4rem 3rem;
    }

    .tabs{
        padding:1rem 3rem;
    }

    .feed-container{
        padding:2rem 3rem calc(var(--nav-height) + 2rem);
    }

    .feed-grid{
        width:100%;
        max-width:100%;
    }

    .card{
        width:100%;
    }

    .fab-container{
        right:3rem;
    }

    .bottom-nav{
        left:0;
        right:0;
        transform:none;
        width:100%;
    }
}

/* EXTRA LARGE MONITORS */
@media (min-width:1600px){

    .header{
        padding:1.5rem 4rem;
    }

    .tabs{
        padding:1rem 4rem;
    }

    .feed-container{
        padding:2rem 4rem calc(var(--nav-height) + 2rem);
    }

    .fab-container{
        right:4rem;
    }
}

        /* ---------- RESET & BASE (Full Screen, No Grid Lines) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg:          #080c18;
            --surface-1:   #0d1425;
            --surface-2:   #111829;
            --surface-3:   #151e35;
            --border:      rgba(255,255,255,0.08);
            --border-glow: rgba(99,179,237,0.25);
            --accent-a:    #63b3ed;
            --accent-b:    #9f7aea;
            --accent-c:    #f6ad55;
            --text-1:      #f0f4ff;
            --text-2:      #8892a4;
            --text-3:      #9ca3af;
            --tag-social:  #f6ad55;
            --tag-self:    #63b3ed;
            --tag-comm:    #68d391;
            --radius-card: 24px;
            --radius-pill: 100px;
            --font-head:   'Syne', sans-serif;
            --font-body:   'DM Sans', sans-serif;
            --nav-height:  76px;
            --max-width:   1400px;
        }

        body {
            background: var(--bg);
            color: var(--text-1);
            font-family: var(--font-body);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* Main app container – full viewport, centered content */
        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            max-width: var(--max-width);
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
        }

        /* ---------- HEADER (sticky, notification icon top-right) ---------- */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,12,24,0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
        }

        @media (min-width: 768px) {
            .header { padding: 1.2rem 2rem; }
        }
        @media (min-width: 1200px) {
            .header { padding: 1.4rem 2.5rem; }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo-area h1 {
            font-family: var(--font-head);
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, var(--accent-a));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .badge {
            background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
            padding: 0.3rem 1rem;
            border-radius: var(--radius-pill);
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            font-weight: 800;
            text-transform: uppercase;
            color: white;
            white-space: nowrap;
        }

        .header-sub {
            font-size: clamp(0.8rem, 3vw, 0.95rem);
            color: var(--text-2);
            margin-top: 0.3rem;
            font-weight: 500;
        }

        /* Notification icon – large, tappable */
        .notification-icon {
            background: var(--surface-2);
            width: clamp(46px, 10vw, 56px);
            height: clamp(46px, 10vw, 56px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid var(--border);
            flex-shrink: 0;
        }
        .notification-icon:hover {
            background: var(--surface-3);
            border-color: var(--accent-a);
            transform: scale(1.02);
        }
        .notification-icon svg {
            width: clamp(24px, 6vw, 30px);
            height: clamp(24px, 6vw, 30px);
            stroke: var(--accent-a);
            stroke-width: 1.8;
            fill: none;
        }

        /* ---------- TABS (fully responsive, no grid lines) ---------- */
        .tabs {
            display: flex;
            gap: clamp(0.8rem, 2.5vw, 1.5rem);
            padding: 1rem 1.5rem;
            background: rgba(8,12,24,0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        @media (min-width: 768px) {
            .tabs { padding: 1.2rem 2rem; }
        }

        .tab {
            flex: 1;
            min-width: 110px;
            text-align: center;
            padding: 0.85rem 1rem;
            border-radius: var(--radius-pill);
            background: var(--surface-2);
            border: 1px solid var(--border);
            font-size: clamp(0.9rem, 3.5vw, 1.05rem);
            font-weight: 700;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        @media (max-width: 550px) {
            .tab { white-space: normal; min-width: auto; }
        }
        .tab.active {
            background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
            border-color: transparent;
            color: white;
            box-shadow: 0 6px 20px rgba(99,179,237,0.3);
            font-weight: 800;
        }
        .tab:hover {
            color: var(--text-1);
            border-color: var(--border-glow);
        }

        /* ---------- FEED CONTAINER (scrollable, dynamic posts) ---------- */
        .feed-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.5rem calc(var(--nav-height) + 1.5rem);
        }
        @media (min-width: 768px) {
            .feed-container { padding: 2rem 2rem calc(var(--nav-height) + 2rem); }
        }
        @media (min-width: 1200px) {
            .feed-container { padding: 2rem 2.5rem calc(var(--nav-height) + 2rem); }
        }

        .feed-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        @media (min-width: 1200px) {
            .feed-grid { max-width: 1000px; }
        }

        /* Empty state (shown when no posts exist) */
        .empty-state {
            text-align: center;
            padding: 4rem 1.5rem;
            color: var(--text-2);
        }
        .empty-state h2 {
            font-family: var(--font-head);
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            color: var(--text-1);
            margin-bottom: 1rem;
        }
        .empty-state p {
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            line-height: 1.5;
            opacity: 0.85;
        }
        .demo-hint {
            text-align: center;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            color: var(--text-3);
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border);
        }

        /* ---------- CARD COMPONENT (for dynamic posts) ---------- */
        .card {
            background: linear-gradient(145deg, var(--surface-2), var(--surface-1));
            border-radius: var(--radius-card);
            padding: clamp(1.2rem, 4vw, 2rem);
            border: 1px solid var(--border);
            transition: all 0.2s;
            width: 100%;
        }
        .card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: clamp(0.8rem, 3vw, 1.2rem);
            flex-wrap: wrap;
        }

        .avatar {
            width: clamp(52px, 12vw, 70px);
            height: clamp(52px, 12vw, 70px);
            border-radius: 50%;
            background: linear-gradient(145deg, #1e2a4a, #0f172f);
            border: 2px solid var(--border-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            flex-shrink: 0;
        }

        .user-meta .user {
            font-weight: 800;
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: var(--text-1);
        }
        .time {
            font-size: clamp(0.75rem, 2.8vw, 0.85rem);
            color: var(--text-3);
            margin-top: 0.3rem;
            font-weight: 500;
        }

        .tag {
            padding: 0.45rem 1.2rem;
            border-radius: var(--radius-pill);
            font-size: clamp(0.7rem, 2.8vw, 0.85rem);
            font-weight: 800;
            border: 1.5px solid currentColor;
            white-space: nowrap;
            background: rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        @media (max-width: 550px) {
            .tag { white-space: normal; text-align: center; }
        }
        .tag-social-anxiety { color: var(--tag-social); border-color: rgba(246,173,85,0.5); background: rgba(246,173,85,0.1); }
        .tag-self-discovery { color: var(--tag-self); border-color: rgba(99,179,237,0.5); background: rgba(99,179,237,0.1); }
        .tag-community      { color: var(--tag-comm); border-color: rgba(104,211,145,0.5); background: rgba(104,211,145,0.1); }
        .tag-success        { color: var(--tag-comm); border-color: rgba(104,211,145,0.5); background: rgba(104,211,145,0.1); }

        .post-text {
            font-size: clamp(1rem, 4.2vw, 1.2rem);
            line-height: 1.55;
            color: var(--text-1);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .reactions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .reaction-bar {
            display: flex;
            align-items: center;
            gap: clamp(1rem, 4vw, 2rem);
            flex-wrap: wrap;
        }
        .like-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            background: var(--surface-3);
            border: 1.5px solid var(--border);
            padding: 0.8rem 1.8rem;
            border-radius: var(--radius-pill);
            color: var(--accent-a);
            font-size: clamp(0.9rem, 3.5vw, 1.05rem);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }
        .like-btn::before {
            content: '⚡';
            font-size: clamp(1.1rem, 4vw, 1.4rem);
        }
        .like-btn.liked {
            background: rgba(99,179,237,0.25);
            border-color: var(--accent-a);
            color: white;
        }
        .comment-count {
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            font-weight: 700;
            color: var(--text-2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .comment-count::before {
            content: '💬';
            font-size: clamp(1rem, 4vw, 1.2rem);
        }

        .comment-input-area {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .comment-input-area input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            border-radius: var(--radius-pill);
            border: 1.5px solid var(--border);
            background: var(--surface-3);
            color: var(--text-1);
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            font-weight: 500;
            outline: none;
            min-width: 180px;
        }
        .comment-input-area input:focus {
            border-color: var(--accent-a);
            box-shadow: 0 0 0 3px rgba(99,179,237,0.2);
        }
        .comment-submit {
            padding: 0.9rem 1.5rem;
            border-radius: var(--radius-pill);
            border: none;
            background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
            color: white;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }

        .comments-list {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .single-comment {
            font-size: clamp(0.85rem, 3.2vw, 0.95rem);
            color: var(--text-2);
            padding: 0.8rem 1.2rem;
            background: var(--surface-3);
            border-radius: 18px;
            border-left: 3px solid var(--accent-a);
            font-weight: 500;
            word-break: break-word;
        }

        /* ---------- FAB BUTTON – no conflict with bottom nav ---------- */
        .fab-container {
            position: fixed;
            bottom: calc(var(--nav-height) + 1rem);
            right: 1.5rem;
            z-index: 200;
        }

        @media (min-width: 768px) {
            .fab-container {
                bottom: calc(var(--nav-height) + 1.5rem);
                right: 2rem;
            }
        }
        @media (min-width: 1400px) {
            .fab-container {
                right: calc((100% - var(--max-width)) / 2 + 2rem);
            }
        }
        .fab {
            width: clamp(60px, 14vw, 76px);
            height: clamp(60px, 14vw, 76px);
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--accent-a), var(--accent-b));
            color: white;
            font-size: clamp(2rem, 7vw, 2.6rem);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(99,179,237,0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fab:hover {
            transform: scale(1.05);
            box-shadow: 0 16px 32px rgba(99,179,237,0.5);
        }
        .fab:active {
            transform: scale(0.96);
        }

        .bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    width:100vw;                 /* FULL SCREEN WIDTH */
    height:var(--nav-height);

    display:flex;
    justify-content:space-around;
    align-items:center;

    padding:.5rem;
    margin:0;

    background:rgba(11,15,28,0.96);
    backdrop-filter:blur(24px);
    border-top:1px solid var(--border);

    z-index:999;
}

/* Navigation Item */
.nav-item{
    flex:1;
    text-align:center;
    color:var(--text-3);
    font-size:.75rem;
    font-weight:700;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:.25rem;
}

.nav-item.active{
    color:var(--accent-a);
}

/* =========================================================
   DESKTOP / LAPTOP IMPROVEMENTS
========================================================= */
@media (min-width:1024px){

    .header{
        padding:1.2rem 3rem;
    }

    .tabs{
        padding:1rem 3rem;
    }

    .feed-container{
        padding:2rem 3rem calc(var(--nav-height) + 2rem);
    }

    .fab-container{
        right:3rem;
    }

    .bottom-nav{
        width:100vw;
        left:0;
        right:0;
    }
}

/* =========================================================
   EXTRA LARGE MONITORS
========================================================= */
@media (min-width:1600px){

    .header{
        padding:1.5rem 4rem;
    }

    .tabs{
        padding:1rem 4rem;
    }

    .feed-container{
        padding:2rem 4rem calc(var(--nav-height) + 2rem);
    }

    .fab-container{
        right:4rem;
    }
}


        /* Scrollbar */
        .feed-container::-webkit-scrollbar {
            width: 5px;
        }
        .feed-container::-webkit-scrollbar-track {
            background: var(--surface-2);
        }
        .feed-container::-webkit-scrollbar-thumb {
            background: var(--accent-a);
            border-radius: 10px;
        }

        /* =====================================================
   FIXED BOTTOM NAVIGATION
   ✔ Bigger clean text
   ✔ Icons visible again
   ✔ Better spacing
   ✔ Responsive mobile + laptop + desktop
===================================================== */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    width:100%;
    height:88px; /* taller nav */

    display:flex;
    justify-content:space-around;
    align-items:center;

    padding:0.4rem 0.8rem;
    margin:0;

    background:rgba(11,15,28,0.97);
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);

    border-top:1px solid var(--border);
    z-index:999;
}

/* =========================================
   EACH NAV ITEM
========================================= */
.nav-item{
    flex:1;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:0.45rem;
    cursor:pointer;

    color:var(--text-3);
    font-size:0.95rem;      /* BIGGER TEXT */
    font-weight:700;
    text-align:center;

    transition:0.25s ease;
}

/* ACTIVE ITEM */
.nav-item.active{
    color:var(--accent-a);
}

/* HOVER */
.nav-item:hover{
    color:var(--text-1);
}

/* =========================================
   ICON CONTAINER
========================================= */
.nav-icon{
    width:32px;
    height:32px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* SVG ICONS FIXED */
.nav-item svg{
    width:26px;
    height:26px;

    stroke:currentColor;
    stroke-width:2;
    fill:none;

    display:block;
}

/* ACTIVE ICON GLOW */
.nav-item.active svg{
    filter:drop-shadow(0 0 4px rgba(99,179,237,0.35));
}

/* =========================================
   TABLETS
========================================= */
@media (min-width:768px){

    .bottom-nav{
        height:92px;
    }

    .nav-item{
        font-size:1rem;
    }

    .nav-item svg{
        width:28px;
        height:28px;
    }
}

/* =========================================
   LAPTOP / DESKTOP
========================================= */
@media (min-width:1024px){

    .bottom-nav{
        height:96px;
        padding:0.5rem 1.5rem;
    }

    .nav-item{
        font-size:1.02rem;
        gap:0.5rem;
    }

    .nav-item svg{
        width:30px;
        height:30px;
    }
}

/* =========================================
   LARGE MONITORS
========================================= */
@media (min-width:1600px){

    .bottom-nav{
        height:100px;
    }

    .nav-item{
        font-size:1.08rem;
    }

    .nav-item svg{
        width:32px;
        height:32px;
    }
}
    </style>
</head>
<body>
<div class="app">
    <!-- HEADER with notification icon -->
    <div class="header">
        <div class="header-content">
            <div class="logo-area">
                <h1>HearMe <span class="badge">PREMIUM</span></h1>
                <p class="header-sub">Anonymous Feed · Safe Space</p>
            </div>
            <div class="notification-icon" id="notificationBell">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" data-filter="all">All Posts</div>
        <div class="tab" data-filter="social">Struggles</div>
        <div class="tab" data-filter="success">Success</div>
    </div>

    <!-- FEED CONTAINER (dynamic posts will be injected here) -->
    <div class="feed-container">
        <div class="feed-grid" id="feedGrid">
            <!-- Empty state placeholder – replace with posts via JS -->
            <div class="empty-state" id="emptyState">
                <h2>✨ welcome to HearMe</h2>
                <p>Your anonymous voice matters.<br>Real stories, real support.</p>
                <div class="demo-hint">↓ tap the + button to create your first post</div>
            </div>
        </div>
    </div>

    <!-- FLOATING ACTION BUTTON (no conflict with bottom nav) -->
    <div class="fab-container">
        <button class="fab" id="createPostFab" aria-label="Create new post">+</button>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item active" data-nav="feed">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
                </svg>
            </span>
