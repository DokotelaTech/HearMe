<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Consolidator | HearMe</title>
    <link rel="stylesheet" href="ai-chat.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
    <div class="ai-header">
        <div class="ai-header-title">
            <h1>AI Consolidator 
                <span class="premium-pill">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> 
                    Premium
                </span>
            </h1>
            <p>Your 24/7 companion</p>
        </div>
    </div>

    <div class="ai-chat-container" id="aiChatBox">
        <div class="ai-message-wrapper">
            <div class="ai-avatar">🤖</div>
            <div class="ai-bubble">
                Hello! I'm your AI companion, here to listen without judgment. This is a safe space where you can share anything on your mind. How are you feeling today? 💙
            </div>
        </div>
    </div>

    <div class="ai-input-area">
        <div class="ai-suggestion">
        </div>
        <div class="input-wrapper">
            <input type="text" id="aiUserInput" placeholder="Share your thoughts..." autocomplete="off">
            <button id="aiSendBtn" class="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="feeds.html" class="nav-item">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg></span>
            Feeds
        </a>
        
        <a href="ai-chat.html" class="nav-item active">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l1.5 4.5H18l-3.75 2.7 1.5 4.5L12 11.1l-3.75 2.6 1.5-4.5L6 6.5h4.5L12 2z"/><circle cx="12" cy="19" r="2" fill="currentColor" stroke="none"/></svg></span>
            AI Chat
        </a>

        <a href="inbox.html" class="nav-item">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></span>
            Inbox
        </a>

        <a href="profile.html" class="nav-item">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
            Profile
        </a>
    </div>
</div>
<script src="config.js"></script>
<script src="ai.js"></script>
</body>
</html>
