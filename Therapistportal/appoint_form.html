<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Appointment</title>

    <link rel="stylesheet" href="portal.css">
</head>
<body>

    <div class="appointment-page">

        <div class="appointment-card">

            <h1>Create Appointment</h1>

            <input
                type="text"
                id="clientName"
                placeholder="Client Name"
            >

            <input
                type="date"
                id="appointmentDate"
            >

            <input
                type="time"
                id="appointmentTime"
            >

            <button id="saveAppointment">
                Save Appointment
            </button>

        </div>

    </div>

    <script src="appoint_form.js"></script>

</body>
</html>
