<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Post – HearMe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="createPost.css">
</head>
<body>
<div class="app">
    <div class="header" style="position: relative;">
        <div class="header-content">
            <div class="logo-area">
                <h1>HearMe <span class="badge">PREMIUM</span></h1>
                <p class="header-sub">Create anonymous post</p>
            </div>
        </div>
    </div>

    <div class="create-container">
        <h2>✨ Share your truth</h2>
        <div class="form-group">
            <label for="postText">What's on your mind?</label>
            <textarea id="postText" rows="5" placeholder="Write anonymously..."></textarea>
        </div>
        <div class="form-group">
            <label for="postTag">Choose a category</label>
            <select id="postTag">
                <option value="Social Anxiety">😟 Social Anxiety (Struggles)</option>
                <option value="Self Discovery">🌱 Self Discovery (Struggles)</option>
                <option value="Community"> 🏆 Achievement</option>
                <option value="Success">🤝 Others</option>
            </select>
        </div>
        <div class="button-group">
            <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button class="btn btn-primary" id="submitPostBtn">Post anonymously</button>
        </div>
    </div>
</div>

<script src="createPost.js"></script>
</body>
</html>
