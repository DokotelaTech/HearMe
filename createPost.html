<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="createPost.css">
<title>Create Post</title>
</head>

<body>

<div class="page">

    <a href="feeds.html" class="back-btn">← Back to Feed</a>

    <div class="post-box">

        <h1>Create Post</h1>
        <p>Share your thoughts anonymously</p>

        <div class="tabs">
            <button class="tab active">Struggle</button>
            <button class="tab">Success</button>
        </div>

        <form>

            <textarea placeholder="What's on your mind?"></textarea>

            <div class="buttons">
                <button type="button" class="cancel">Cancel</button>
                <button type="submit" class="post">Post</button>
            </div>

        </form>

    </div>

</div>

<script src="createPost.js"> </script>
</body>
</html>
