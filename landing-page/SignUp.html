<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HearMe - Join Us</title>

    <link rel="stylesheet" href="signup.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <div class="brand-header">
        <h1>HearMe</h1>
        <p>Your safe space for healing</p>
    </div>

    <div class="container">

        <div class="form-box">

            <h2>Join HearMe</h2>

            <form id="signup-form">

                <!-- ROLE -->
                <p class="label-text">I am a:</p>

                <div class="role-selector">

                    <div class="role-option active" data-role="user">
                        <i class="fa-regular fa-user"></i>
                        <span>User</span>
                    </div>

                    <div class="role-option" data-role="therapist">
                        <i class="fa-solid fa-user-doctor"></i>
                        <span>Therapist</span>
                    </div>

                    <div class="role-option" data-role="admin">
                        <i class="fa-solid fa-shield"></i>
                        <span>Admin</span>
                    </div>

                </div>

                <!-- USER SECTION -->
                <div id="user-fields">

                    <div class="anon-toggle">

                        <input type="checkbox" checked disabled>

                        <label>
                            Your identity will stay anonymous publicly
                        </label>

                    </div>

                    <p class="label-text">
                        What are you struggling with?
                    </p>

                    <div class="struggles-grid">

                        <label><input type="checkbox" value="Anxiety"> Anxiety</label>

                        <label><input type="checkbox" value="Depression"> Depression</label>

                        <label><input type="checkbox" value="Stress"> Stress</label>

                        <label><input type="checkbox" value="Trauma"> Trauma</label>

                        <label><input type="checkbox" value="Loneliness"> Loneliness</label>

                        <label><input type="checkbox" value="Relationships"> Relationships</label>

                    </div>

                </div>

                <!-- THERAPIST SECTION -->
                <div id="therapist-fields" style="display:none;">

                    <div class="input-group">
                        <i class="fa-regular fa-user"></i>

                        <input
                            type="text"
                            id="firstName"
                            placeholder="First Name"
                        >
                    </div>

                    <div class="input-group">
                        <i class="fa-regular fa-user"></i>

                        <input
                            type="text"
                            id="lastName"
                            placeholder="Last Name"
                        >
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-graduation-cap"></i>

                        <input
                            type="text"
                            id="qualification"
                            placeholder="Qualification"
                        >
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-building"></i>

                        <input
                            type="text"
                            id="institutionName"
                            placeholder="Institution Name"
                        >
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-location-dot"></i>

                        <input
                            type="text"
                            id="location"
                            placeholder="Location"
                        >
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-brain"></i>

                        <input
                            type="text"
                            id="specialization"
                            placeholder="Specialization"
                        >
                    </div>

                </div>

                <!-- EMAIL -->
                <div class="input-group">

                    <i class="fa-regular fa-envelope"></i>

                    <input
                        id="email"
                        type="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>

                <!-- PASSWORD -->
                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        id="password"
                        type="password"
                        placeholder="Create a secure password"
                        required
                    >

                </div>

                <button type="submit" id="Btn">
                    Create Account
                </button>

                <p class="footer-text">
                    Already have an account?
                    <a href="login.html">Sign in</a>
                </p>

            </form>

        </div>

    </div>

    <script src="signup.js"></script>

</body>
</html>
