<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HearMe - Join Us</title>
    <link rel="stylesheet" href="signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="brand-header">
        <h1>HearMe</h1>
        <p>Your safe space for healing</p>
    </div>

    <div class="container">
        <div class="form-box">
            <h2>Join HearMe</h2>
            <form id="signup-form">
                <p class="label-text">I am a:</p>
                <div class="role-selector">
                    <div class="role-option active" data-role="user">
                        <i class="fa-regular fa-user"></i>
                        <span>User</span>
                    </div>
                    <div class="role-option" data-role="therapist">
                        <i class="fa-solid fa-user-doctor"></i>
                        <span>Therapist</span>
                    </div>
                    <div class="role-option" data-role="admin">
                        <i class="fa-solid fa-shield"></i>
                        <span>Admin</span>
                    </div>
                </div>

                <div id="anon-section">
                    <div class="anon-toggle">
                        <input type="checkbox" id="anonymous" checked>
                        <label for="anonymous">Keep me completely anonymous (recommended)</label>
                    </div>
                </div>

                <div class="input-field">
                    <label id="identifier-label" class="label-text">Create Anonymous ID</label>
                    <div class="input-group">
                        <i id="input-icon" class="fa-regular fa-user"></i>
                        <input id="identifier" type="text" placeholder="Auto-generated ID">
                    </div>
                </div>

                <div class="input-field">
                    <label class="label-text">Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input id="password" type="password" placeholder="Create a secure password" required>
                    </div>
                </div>

                <div id="info-box" class="info-message" style="display: none;">
                    Your account will be reviewed by our admin team. You'll need to upload verification documents after signup.
                </div>

                <button type="submit" id="Btn">Create Account</button>
                <p class="footer-text">Already have an account? <a href="login.html">Sign in</a></p>
            </form>
        </div>
    </div>

    <script src="signup.js"></script>
</body>
</html>
